<!DOCTYPE html>
<html>
<head>
    <title>Exchange History</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background:
              linear-gradient(rgba(255,255,255,0.55), rgba(255,255,255,0.55)),
              url("pharmacy.jpg") no-repeat center center fixed;
            background-size: cover;
        }

        h2 {
            text-align:center;
            color:#065f46;
            margin-top:30px;
        }

        table {
            width: 95%;
            margin: 30px auto;
            border-collapse: collapse;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(4px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        th, td {
            padding: 14px;
            border-bottom: 1px solid #e5e7eb;
            text-align: center;
        }

        th {
            background:#059669;
            color:white;
            font-weight:600;
        }

        tr:hover {
            background:#f0fdf4;
        }

        .badge {
            background:#16a34a;
            color:white;
            padding:6px 12px;
            border-radius:20px;
            font-size:13px;
            font-weight:500;
        }

        .no-data {
            text-align:center;
            margin-top:40px;
            font-size:18px;
            color:#6b7280;
            font-weight:500;
        }
    </style>
</head>
<body>

<div id="navbar"></div>

<script>
fetch("navbar.html")
.then(res => res.text())
.then(data => {
    document.getElementById("navbar").innerHTML = data;
});
</script>

<h2>Completed Medicine Exchanges</h2>

<table>
    <thead>
        <tr>
            <th>Medicine</th>
            <th>Quantity</th>
            <th>Requested By</th>
            <th>Donated By</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody id="historyTable"></tbody>
</table>

<p id="noData" class="no-data" style="display:none;">
    No Completed Exchanges Yet
</p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgNSn-4Pg8O5aUvwkn3fwb_jZyOfXqzm4",
  authDomain: "smart-medicine-exchange.firebaseapp.com",
  databaseURL: "https://smart-medicine-exchange-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "smart-medicine-exchange",
  storageBucket: "smart-medicine-exchange.firebasestorage.app",
  messagingSenderId: "968345724247",
  appId: "1:968345724247:web:b31b8d14c93e9a5f240a12"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const table = document.getElementById("historyTable");
const noData = document.getElementById("noData");

onValue(ref(db, "requests"), (snapshot) => {
    table.innerHTML = "";
    let found = false;

    snapshot.forEach((child) => {
        const data = child.val();

        if (data.status === "Approved") {
            found = true;

            table.innerHTML += `
            <tr>
                <td>${data.name}</td>
                <td>${data.quantity}</td>
                <td>${data.requestedBy}</td>
                <td>${data.donatedBy}</td>
                <td><span class="badge">Completed</span></td>
            </tr>`;
        }
    });

    noData.style.display = found ? "none" : "block";
});
</script>

</body>
</html>
