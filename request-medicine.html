<!DOCTYPE html>
<html>
<head>
    <title>Send Medicine Request</title>

    <!-- Modern Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #eef2ff, #e0f2fe);
            margin: 0;
        }

        .container {
            width: 400px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #1e3a8a;
            font-weight: 600;
        }

        label {
            font-weight: 500;
            display: block;
            margin-top: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
        }

        button {
            width: 100%;
            margin-top: 25px;
            padding: 12px;
            background: linear-gradient(90deg, #2563eb, #4f46e5);
            border: none;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            font-size: 15px;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        .back {
            text-align: center;
            margin-top: 20px;
        }

        .back a {
            text-decoration: none;
            color: #2563eb;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Send Medicine Request</h2>

    <label>Medicine Name</label>
    <input type="text" id="medicineName" placeholder="Enter medicine name">

    <label>Quantity Needed</label>
    <input type="number" id="quantity" placeholder="Enter quantity">

    <button onclick="submitRequest()">Send Request</button>

    <div class="back">
        <a href="dashboard.html">← Back to Dashboard</a>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgNSn-4Pg8O5aUvwkn3fwb_jZyOfXqzm4",
  authDomain: "smart-medicine-exchange.firebaseapp.com",
  databaseURL: "https://smart-medicine-exchange-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "smart-medicine-exchange",
  storageBucket: "smart-medicine-exchange.firebasestorage.app",
  messagingSenderId: "968345724247",
  appId: "1:968345724247:web:b31b8d14c93e9a5f240a12"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.submitRequest = function() {

    const name = document.getElementById("medicineName").value;
    const quantity = document.getElementById("quantity").value;
    const pharmacy = localStorage.getItem("pharmacyName") || "Unknown Pharmacy";

    if (!name || !quantity) {
        alert("Please fill all fields");
        return;
    }

    push(ref(db, "requests"), {
        name: name,
        quantity: quantity,
        requestedBy: pharmacy,
        status: "Pending",
        donatedBy: ""
    })
    .then(() => {
        alert("✅ Request Sent To All Pharmacies!");
        document.getElementById("medicineName").value = "";
        document.getElementById("quantity").value = "";
    })
    .catch((error) => {
        alert("Error: " + error.message);
        console.log(error);
    });
};
</script>

</body>
</html>
