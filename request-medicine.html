<!DOCTYPE html>
<html>
<head>
    <title>Send Medicine Request</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        *{
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            height: 100vh;

            /* Medicine Background */
            background: 
                linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)),
                url("pharmacy.jpg") no-repeat center center fixed;
            background-size: cover;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 420px;
            backdrop-filter: blur(14px);
            background: rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        label {
            font-weight: 500;
            display: block;
            margin-top: 18px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 13px;
            margin-top: 8px;
            border-radius: 12px;
            border: none;
            font-size: 14px;
            outline: none;
            background: rgba(255,255,255,0.9);
        }

        input:focus {
            box-shadow: 0 0 0 2px #60a5fa;
        }

        button {
            width: 100%;
            margin-top: 30px;
            padding: 13px;
            background: linear-gradient(90deg, #2563eb, #4f46e5);
            border: none;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(37,99,235,0.4);
        }

        .back {
            text-align: center;
            margin-top: 22px;
        }

        .back a {
            text-decoration: none;
            color: #bfdbfe;
            font-size: 14px;
        }

        .back a:hover {
            color: white;
        }

        @media (max-width: 500px){
            .container{
                width: 90%;
                padding: 25px;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <h2>Send Medicine Request</h2>

    <label>Medicine Name</label>
    <input type="text" id="medicineName" placeholder="Enter medicine name">

    <label>Quantity Needed</label>
    <input type="number" id="quantity" placeholder="Enter quantity">

    <button onclick="submitRequest()">Send Request</button>

    <div class="back">
        <a href="dashboard.html">← Back to Dashboard</a>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgNSn-4Pg8O5aUvwkn3fwb_jZyOfXqzm4",
  authDomain: "smart-medicine-exchange.firebaseapp.com",
  databaseURL: "https://smart-medicine-exchange-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "smart-medicine-exchange",
  storageBucket: "smart-medicine-exchange.firebasestorage.app",
  messagingSenderId: "968345724247",
  appId: "1:968345724247:web:b31b8d14c93e9a5f240a12"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.submitRequest = function() {

    const name = document.getElementById("medicineName").value.trim();
    const quantity = document.getElementById("quantity").value.trim();
    const pharmacy = localStorage.getItem("pharmacyName") || "Unknown Pharmacy";

    if (!name || !quantity) {
        alert("⚠️ Please fill all fields");
        return;
    }

    push(ref(db, "requests"), {
        name: name,
        quantity: quantity,
        requestedBy: pharmacy,
        status: "Pending",
        donatedBy: ""
    })
    .then(() => {
        alert("✅ Request Sent Successfully!");
        document.getElementById("medicineName").value = "";
        document.getElementById("quantity").value = "";
    })
    .catch((error) => {
        alert("❌ Error: " + error.message);
        console.log(error);
    });
};
</script>

</body>
</html>
