<!-- navbar.html -->

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">

<style>
.navbar {
    width: 100%;
    padding: 15px 40px;
    background: linear-gradient(90deg, #2563eb, #4f46e5);
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    box-sizing: border-box;
}

.navbar h2 {
    color: white;
    margin: 0;
    font-size: 20px;
    font-weight: 600;
}

.nav-links a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-size: 14px;
    padding: 6px 14px;
    border-radius: 20px;
    transition: 0.3s;
}

.nav-links a:hover {
    background: rgba(255,255,255,0.2);
}
</style>

<div class="navbar">
    <h2>Smart Medicine Exchange</h2>

    <div class="nav-links">
        <a href="dashboard.html"> Back to Dashboard</a>

    </div>
</div>
