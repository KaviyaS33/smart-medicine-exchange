<!DOCTYPE html>
<html>
<head>
  <title>All Medicine Requests</title>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      margin: 0;
      min-height: 100vh;

      background:
        linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)),
        url("pharmacy.jpg") no-repeat center center fixed;
      background-size: cover;
      color: white;
      text-align: center;
    }

    h2 {
      margin-top: 40px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    #navbar {
      margin-top: 10px;
    }

    .table-container {
      width: 95%;
      margin: 30px auto 60px auto;
      backdrop-filter: blur(14px);
      background: rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 25px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      color: white;
    }

    th, td {
      padding: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      font-size: 14px;
    }

    th {
      background: rgba(220,38,38,0.9);
      font-weight: 600;
    }

    tr:hover {
      background: rgba(255,255,255,0.05);
    }

    .btn {
      padding: 7px 14px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: 0.3s;
    }

    .donate-btn {
      background: linear-gradient(90deg, #16a34a, #22c55e);
      color: white;
    }

    .donate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(34,197,94,0.4);
    }

    .badge {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      display: inline-block;
    }

    .pending { background: #facc15; color: #111; }
    .approved { background: #22c55e; color: white; }

    @media (max-width: 768px){
      th, td { font-size: 12px; padding: 10px; }
    }

  </style>
</head>

<body>

<h2>All Medicine Requests</h2>
<div id="navbar"></div>

<script>
fetch("navbar.html")
.then(res => res.text())
.then(data => {
    document.getElementById("navbar").innerHTML = data;
});
</script>

<div class="table-container">
<table>
  <thead>
    <tr>
      <th>Medicine</th>
      <th>Quantity</th>
      <th>Requested By</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="requestsTable"></tbody>
</table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update, get } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgNSn-4Pg8O5aUvwkn3fwb_jZyOfXqzm4",
  authDomain: "smart-medicine-exchange.firebaseapp.com",
  databaseURL: "https://smart-medicine-exchange-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "smart-medicine-exchange",
  storageBucket: "smart-medicine-exchange.firebasestorage.app",
  messagingSenderId: "968345724247",
  appId: "1:968345724247:web:b31b8d14c93e9a5f240a12"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const table = document.getElementById("requestsTable");
const currentPharmacy = localStorage.getItem("pharmacyName");

onValue(ref(db, "requests"), (snapshot) => {
  table.innerHTML = "";
  snapshot.forEach((child) => {
    const data = child.val();
    const id = child.key;

    const statusBadge = data.status === "Pending"
      ? `<span class="badge pending">Pending</span>`
      : `<span class="badge approved">Approved</span>`;

    const actionBtn =
      data.status === "Pending" && data.requestedBy !== currentPharmacy
      ? `<button class="btn donate-btn" onclick="approveRequest('${id}')">Donate</button>`
      : (data.status === "Approved" ? `Donated by <b>${data.donatedBy}</b>` : "-");

    const row = `
      <tr>
        <td>${data.name}</td>
        <td>${data.quantity}</td>
        <td>${data.requestedBy}</td>
        <td>${statusBadge}</td>
        <td>${actionBtn}</td>
      </tr>
    `;
    table.innerHTML += row;
  });
});

window.approveRequest = async function(id) {

  const requestRef = ref(db, "requests/" + id);
  const snapshot = await get(requestRef);
  const requestData = snapshot.val();

  await update(requestRef, {
    status: "Approved",
    donatedBy: currentPharmacy
  });

  const medicinesRef = ref(db, "medicines");
  const medSnap = await get(medicinesRef);

  medSnap.forEach((child) => {
    const med = child.val();
    if (med.name === requestData.name && med.status === "Available") {
      update(ref(db, "medicines/" + child.key), {
        status: "Approved",
        requestedBy: requestData.requestedBy,
        approvedBy: currentPharmacy
      });
    }
  });

  alert("✅ Medicine Approved & Exchange Completed!");
};
</script>

</body>
</html>
