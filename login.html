<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Medicine Exchange</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
    body {
        background-image: url('pharmacy.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        height: 100vh;
        margin: 0;
    }

    .overlay {
        background: rgba(0,0,0,0.45); /* dark transparent */
        min-height: 100vh;
        padding-top: 80px;
    }

    h1, p {
        color: white;
    }
</style>
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4 mx-auto" style="max-width: 400px;">
        <h3 class="text-center text-primary">Pharmacy Login</h3>

        <div class="mt-3">
            <label class="form-label">Pharmacy Name</label>
            <input type="text" class="form-control" id="pharmacy">
        </div>

        <div class="mt-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control">
        </div>

        <div class="mt-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control">
        </div>

        <button class="btn btn-primary w-100 mt-4" onclick="login()">Login / Register</button>
    </div>
</div>

<script>
function login() {
    const name = document.getElementById("pharmacy").value;
    if(name === "") {
        alert("Enter Pharmacy Name");
        return;
    }
    localStorage.setItem("pharmacyName", name);
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
